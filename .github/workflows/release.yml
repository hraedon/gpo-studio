name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.13"
      - name: Set up Node
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: "24"
          cache: npm
      - name: Install application and test dependencies
        run: |
          pip install -e '.[dev]'
          npm ci
          npx playwright install --with-deps chromium firefox
      - name: Run release gates
        run: |
          ruff check .
          mypy src
          pytest -q --cov=src/gpo_studio --cov-branch --cov-report=json:coverage.json
          python scripts/check_coverage.py coverage.json
          python scripts/check_safety.py
          python scripts/rehearse_upgrade_rollback.py
          npm run check
          npm run test:browser

  publish:
    needs: verify
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.13"
      - name: Verify immutable release identity
        run: |
          VERSION=$(python -c "exec(open('src/gpo_studio/__init__.py').read()); print(__version__)")
          TAG_VERSION=${VERSION/rc/-rc.}
          test "${GITHUB_REF_NAME}" = "v${TAG_VERSION}"
          case "$VERSION" in
            *dev*) echo "Refusing release workflow for development version: $VERSION"; exit 1 ;;
            *rc*)
              grep -q '^> \*\*Status:\*\* release candidate; final approval pending' \
                docs/release-evidence.md
              ;;
            *)
              grep -q '^> \*\*Status:\*\* approved for release' docs/release-evidence.md
              ;;
          esac
      - name: Install release tools
        run: pip install build cyclonedx-bom
      - name: Build reproducible distributions
        env:
          SOURCE_DATE_EPOCH: "315532800"
        run: |
          python -m build --outdir dist
          python -m build --outdir dist-repro
          for artifact in dist/*; do
            cmp "$artifact" "dist-repro/$(basename "$artifact")"
          done
      - name: Validate exact wheel
        run: |
          WHEEL=$(find dist -maxdepth 1 -name 'gpo_studio-*.whl' -print -quit)
          PYTHON=python GPO_STUDIO_WHEEL="$WHEEL" bash scripts/installed_package_smoke.sh
          python -m venv /tmp/wheel-venv
          /tmp/wheel-venv/bin/pip install "$WHEEL"
      - name: Validate exact source distribution
        run: |
          python -m venv /tmp/sdist-venv
          /tmp/sdist-venv/bin/pip install dist/gpo_studio-*.tar.gz
          /tmp/sdist-venv/bin/gpo-studio --help > /dev/null
      - name: Rehearse upgrade and rollback with exact wheel
        run: /tmp/wheel-venv/bin/python scripts/rehearse_upgrade_rollback.py
      - name: Generate resolved evidence, SBOM, and checksums
        run: |
          python -m venv /tmp/sbom-venv
          /tmp/sbom-venv/bin/pip install dist/gpo_studio-*.whl
          /tmp/sbom-venv/bin/pip uninstall --yes pip
          cyclonedx-py environment /tmp/sbom-venv/bin/python \
            --pyproject pyproject.toml \
            --output-reproducible \
            --output-format JSON \
            --output-file sbom.cdx.json
          cp docs/release-evidence.md release-evidence.md
          cp docs/release-evidence-report.json release-evidence-report.json
          python - <<'PY'
          import hashlib
          import json
          import os
          from pathlib import Path

          def sha256(path: Path) -> str:
              return hashlib.sha256(path.read_bytes()).hexdigest()

          wheel = next(Path("dist").glob("gpo_studio-*.whl"))
          sdist = next(Path("dist").glob("gpo_studio-*.tar.gz"))
          sbom = Path("sbom.cdx.json")
          artifacts = {
              "wheel_sha256": sha256(wheel),
              "sdist_sha256": sha256(sdist),
              "sbom_sha256": sha256(sbom),
          }

          report_path = Path("release-evidence-report.json")
          report = json.loads(report_path.read_text(encoding="utf-8"))
          report["release_identity"] = {
              "source_commit": os.environ["GITHUB_SHA"],
              "tag": os.environ["GITHUB_REF_NAME"],
          }
          report["artifact_hashes"].update(artifacts)
          report["artifact_hashes"].pop("evidence_report_sha256", None)
          report_path.write_text(
              json.dumps(report, indent=2, ensure_ascii=False) + "\n",
              encoding="utf-8",
          )

          with Path("release-evidence.md").open("a", encoding="utf-8") as stream:
              stream.write("\n## Resolved release identity\n\n")
              stream.write(f"- Source commit: `{os.environ['GITHUB_SHA']}`\n")
              stream.write(f"- Tag: `{os.environ['GITHUB_REF_NAME']}`\n")
              stream.write(f"- Wheel `{wheel.name}` SHA-256: `{artifacts['wheel_sha256']}`\n")
              stream.write(f"- Source distribution `{sdist.name}` SHA-256: `{artifacts['sdist_sha256']}`\n")
              stream.write(f"- SBOM SHA-256: `{artifacts['sbom_sha256']}`\n")
          PY
          sha256sum dist/* sbom.cdx.json release-evidence.md release-evidence-report.json > SHA256SUMS
      - name: Attest release artifacts
        uses: actions/attest-build-provenance@977bb373ede98d70efdf65b84cb5f73e068dcc2a # v3
        with:
          subject-path: |
            dist/*
            SHA256SUMS
            release-evidence.md
            release-evidence-report.json
      - name: Attest release SBOM
        uses: actions/attest-sbom@4651f806c01d8637787e274ac3bdf724ef169f34 # v3
        with:
          subject-path: dist/*
          sbom-path: sbom.cdx.json
      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          FLAGS=()
          NOTES_ARGS=(--generate-notes)
          case "$GITHUB_REF_NAME" in
            *-rc.*)
              FLAGS+=(--prerelease)
              NOTES_ARGS=(--notes "Immutable release candidate for hands-on NVDA validation. This prerelease is not approved for production or the final 1.0 release. Download the wheel and SHA256SUMS from Assets and follow docs/nvda-validation-runbook.md.")
              ;;
          esac
          gh release create "$GITHUB_REF_NAME" \
            dist/* sbom.cdx.json SHA256SUMS release-evidence.md release-evidence-report.json \
            --verify-tag "${NOTES_ARGS[@]}" \
            --title "GPO Studio ${GITHUB_REF_NAME#v}" "${FLAGS[@]}"
